project: AOI PSI CDPSI Minimal 6 Scene

aoi:
  name: example-aoi
  bbox: [-7.78, 33.46, -7.24, 33.72]
  crs: EPSG:4326

acquisition:
  provider: cdse-stac
  s1_catalog_url: https://stac.dataspace.copernicus.eu/v1
  s1_collection: sentinel-1-slc
  s2_catalog_url: https://earth-search.aws.element84.com/v1
  s2_collection: sentinel-2-l2a
  time_window:
    start: 2023-08-01
    end: 2023-11-30
  s2_time_window:
    start: 2019-01-01
    end: 2025-12-31
  odata_catalog_url: https://catalogue.dataspace.copernicus.eu/odata/v1
  auth:
    bearer_token_env: CDSE_ACCESS_TOKEN
    access_token_env: ACCESS_TOKEN
    refresh_token_env: REFRESH_TOKEN
  s3:
    enabled: true
    endpoint_url: https://eodata.dataspace.copernicus.eu
    bucket: eodata
    region_name: default
    access_key_env: CDSE_S3_ACCESS_KEY
    secret_key_env: CDSE_S3_SECRET_KEY
    session_token_env: null
    max_attempts: 5
  download_transport: auto
  download_workers: 2
  timeout_seconds: 300
  slc_asset_priority: [product, safe_manifest]

dem:
  path: data/reference/dem/copdem_30m_aoi_snap.tif
  vertical_datum: EGM96
  resampling: BILINEAR_INTERPOLATION

stacks:
  - id: asc_rel147_vv
    direction: ascending
    relative_orbit: 147
    iw_swaths: [IW1, IW2, IW3]
    polarization: VV
    master_date: 2023-09-22
    min_scenes: 6
    scene_limit: 6

snap:
  gpt_path: /opt/snap/bin/gpt
  gpt_vmoptions_path: /opt/snap/bin/gpt.vmoptions
  graph_root: resources/snap_graphs
  orbit_source: precise
  user_dir: data/cache/snap-gpt-userdir
  cache_size_mb: 2048
  java_options: [-Xms2G, -Xmx8G]
  clear_tile_cache_after_row: true
  default_tile_size_px: 512
  subset_to_aoi: true
  write_intermediate_geotiff: false
  workers: 1

stamps:
  install_root: /opt/StaMPS
  matlab_command: matlab
  octave_command: null
  use_octave: false
  export_script: resources/stamps/export_ps_points.m
  amplitude_dispersion_threshold: 0.4
  weed_standard_dev: 1.0
  unwrap_method: 3D
  small_baseline_mode: false
  range_patches: 4
  azimuth_patches: 3
  max_parallel_patch_workers: 1
  range_overlap: 50
  azimuth_overlap: 50
  merge_resample_size: 100
  mask_file: null

psi:
  method: cdpsi
  minimum_subset_images: 3
  thresholding_mode: gaussian_3sigma
  sigma_multiplier: 3.0
  cluster_buffer_m: 12.0

amplitude:
  enabled: true
  ratio_min: 1.35
  log_ratio_min: 0.30
  min_connected_pixels: 4

s2_refinement:
  enabled: true
  min_clear_observations: 2
  max_cloud_cover: 70.0
  clear_scl_classes: [2, 4, 5, 6, 7]
  min_clear_fraction: 0.20
  support_score_min: 2
  use_bsi: true
  allow_unavailable: true
  thresholds:
    ndvi_after_max: 0.35
    mndwi_after_max: 0.00
    ndbi_after_min: -0.02
    delta_ndbi_min: 0.02
    bsi_after_min: 0.02
    delta_bsi_min: 0.01

context:
  parcel_path: null
  building_footprints_path: null
  land_use_path: null

fusion:
  psi_primary_weight: 0.65
  amplitude_weight: 0.20
  optical_weight: 0.10
  context_weight: 0.05
  high_confidence_threshold: 0.70
  medium_confidence_threshold: 0.45
  allow_s2_non_support_penalty: true
  s2_non_support_penalty: 0.08

export:
  raster_driver: GTiff
  raster_compress: DEFLATE
  raster_predictor: 2
  vector_formats: [parquet, gpkg]
  save_intermediate_points: true

cache:
  overwrite: false
  reuse_manifests: true
  reuse_downloads: true
  reuse_snap_outputs: true
  reuse_stamps_outputs: true

run:
  output_root: runs_psi
  log_level: INFO
  write_log_file: true
